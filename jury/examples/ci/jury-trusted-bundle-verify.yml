name: Jury trusted bundle verification

on:
  workflow_call:
    inputs:
      bundle-path:
        type: string
        default: jury/examples/ci/fixtures/key-policy/review-bundle.signed.json
      key-policy-path:
        type: string
        default: jury/examples/ci/fixtures/key-policy/jury-key-policy.json
      state-dir:
        type: string
        default: .jury-trusted
      verdict-out:
        type: string
        default: imported-verdict.json
      gate-out:
        type: string
        default: trusted-gate.json
      claim-id:
        type: string
        default: claim_ci_change

jobs:
  verify-trusted-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check key-policy fixtures
        run: npm --prefix jury run fixtures:key-policy:check
      - name: Verify trusted Jury bundle
        env:
          JURY_BUNDLE_PATH: ${{ inputs.bundle-path }}
          JURY_KEY_POLICY_PATH: ${{ inputs.key-policy-path }}
          JURY_STATE_DIR: ${{ inputs.state-dir }}
          JURY_VERDICT_OUT: ${{ inputs.verdict-out }}
          JURY_GATE_OUT: ${{ inputs.gate-out }}
          JURY_CLAIM_ID: ${{ inputs.claim-id }}
        run: |
          node jury/bin/jury.mjs bundle preflight --bundle "$JURY_BUNDLE_PATH" --key-policy "$JURY_KEY_POLICY_PATH"
          node jury/bin/jury.mjs bundle import --state-dir "$JURY_STATE_DIR" --bundle "$JURY_BUNDLE_PATH" --key-policy "$JURY_KEY_POLICY_PATH" --verdict-out "$JURY_VERDICT_OUT"
          node jury/bin/jury.mjs gate --state-dir "$JURY_STATE_DIR" --claim "$JURY_CLAIM_ID" --verdict "$JURY_VERDICT_OUT" --json > "$JURY_GATE_OUT"
          node jury/bin/jury.mjs check --state-dir "$JURY_STATE_DIR" --strict
      - name: Upload trusted Jury artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jury-trusted-review
          path: |
            ${{ inputs.verdict-out }}
            ${{ inputs.gate-out }}
            ${{ inputs.state-dir }}/*.jsonl
