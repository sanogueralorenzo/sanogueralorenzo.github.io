name: Jury npm publish

on:
  workflow_dispatch:
    inputs:
      dry_run_reviewer:
        description: Person who reviewed the verified dry-run package summary
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  package-manifest:
    uses: ./.github/workflows/jury-package-manifest-check.yml
    with:
      package-dir: jury

  package-release-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check Jury package release evidence fixtures
        env:
          JURY_PACKAGE_DIR: jury
        run: npm --prefix "$JURY_PACKAGE_DIR" run fixtures:package-release:check
      - name: Check Jury package release archive manifest drift
        env:
          JURY_PACKAGE_DIR: jury
        run: npm --prefix "$JURY_PACKAGE_DIR" run fixtures:package-release:drift
      - name: Export Jury package release archive manifest
        env:
          JURY_PACKAGE_DIR: jury
          JURY_PACKAGE_RELEASE_EVIDENCE_DIR: examples/ci/fixtures/package-release
        run: npm --prefix "$JURY_PACKAGE_DIR" run fixtures:package-release:check -- --fixture-dir "$JURY_PACKAGE_RELEASE_EVIDENCE_DIR" --manifest-out ../retained-package-release-evidence-manifest.json
      - name: Upload Jury package release evidence audits
        uses: actions/upload-artifact@v4
        with:
          name: jury-package-release-evidence
          retention-days: 90
          path: |
            jury/examples/ci/fixtures/package-release/README.md
            jury/examples/ci/fixtures/package-release/jury-pack-dry-run-record.json
            jury/examples/ci/fixtures/package-release/failed-npm-view.json
            jury/examples/ci/fixtures/package-release/downstream-failure-gate.json
            jury/examples/ci/fixtures/package-release/rollback-audit.json
            jury/examples/ci/fixtures/package-release/replacement-npm-view.json
            jury/examples/ci/fixtures/package-release/replacement-downstream-gate.json
            jury/examples/ci/fixtures/package-release/replacement-patch-audit.json
            jury/examples/ci/fixtures/package-release/archive-drift-remediation-audit.json
      - name: Upload Jury package release archive manifest
        uses: actions/upload-artifact@v4
        with:
          name: jury-package-release-archive-manifest
          retention-days: 90
          path: |
            retained-package-release-evidence-manifest.json

  package-release-evidence-replay:
    runs-on: ubuntu-latest
    needs: package-release-fixtures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download Jury package release evidence audits
        uses: actions/download-artifact@v4
        with:
          name: jury-package-release-evidence
          path: package-release-evidence
      - name: Download Jury package release archive manifest
        uses: actions/download-artifact@v4
        with:
          name: jury-package-release-archive-manifest
          path: package-release-manifest
      - name: Replay Jury package release evidence audits
        env:
          JURY_PACKAGE_RELEASE_EVIDENCE_DIR: ../package-release-evidence
        run: npm --prefix jury run fixtures:package-release:check -- --fixture-dir "$JURY_PACKAGE_RELEASE_EVIDENCE_DIR"
      - name: Replay Jury package release archive manifest
        env:
          JURY_PACKAGE_RELEASE_EVIDENCE_DIR: ../package-release-evidence
          JURY_PACKAGE_RELEASE_MANIFEST_PATH: ../package-release-manifest/retained-package-release-evidence-manifest.json
        run: npm --prefix jury run fixtures:package-release:check -- --fixture-dir "$JURY_PACKAGE_RELEASE_EVIDENCE_DIR" --verify-manifest "$JURY_PACKAGE_RELEASE_MANIFEST_PATH"

  dry-run-publication:
    runs-on: ubuntu-latest
    needs:
      - package-manifest
      - package-release-evidence-replay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create Jury package dry-run record
        env:
          JURY_PACKAGE_DIR: jury
        run: |
          (cd "$JURY_PACKAGE_DIR" && npm pack --dry-run --json) > jury-pack-dry-run.json
          node -e 'const fs=require("node:fs"); const [pack]=JSON.parse(fs.readFileSync("jury-pack-dry-run.json","utf8")); fs.writeFileSync("jury-pack-dry-run-record.json", JSON.stringify({ packageVersion: pack.version, tarballName: pack.filename }, null, 2) + "\n");'
      - name: Upload Jury package dry-run record
        uses: actions/upload-artifact@v4
        with:
          name: jury-package-dry-run
          retention-days: 90
          path: |
            jury-pack-dry-run.json
            jury-pack-dry-run-record.json

  publish:
    runs-on: ubuntu-latest
    needs:
      - package-manifest
      - package-release-evidence-replay
      - dry-run-publication
    steps:
      - uses: actions/checkout@v4
      - name: Download Jury package dry-run record
        uses: actions/download-artifact@v4
        with:
          name: jury-package-dry-run
          path: .
      - name: Verify Jury package dry-run record
        env:
          JURY_DRY_RUN_REVIEWER: ${{ inputs.dry_run_reviewer }}
        run: |
          node -e 'const fs=require("node:fs"); const pkg=JSON.parse(fs.readFileSync("jury/package.json","utf8")); const record=JSON.parse(fs.readFileSync("jury-pack-dry-run-record.json","utf8")); const reviewer=(process.env.JURY_DRY_RUN_REVIEWER||"").trim(); const expectedTarball=`sanogueralorenzo-jury-${pkg.version}.tgz`; if (!reviewer) throw new Error("JURY_DRY_RUN_REVIEWER must identify who reviewed the dry-run package summary"); if (record.packageVersion !== pkg.version) throw new Error(`packageVersion ${record.packageVersion} did not match ${pkg.version}`); if (record.tarballName !== expectedTarball) throw new Error(`tarballName ${record.tarballName} did not match ${expectedTarball}`); if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `### Jury package dry-run\n\n- packageVersion: ${record.packageVersion}\n- tarballName: ${record.tarballName}\n- reviewedBy: ${reviewer}\n`);'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish Jury package
        env:
          JURY_PACKAGE_DIR: jury
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          test -n "$NODE_AUTH_TOKEN"
          cd "$JURY_PACKAGE_DIR"
          npm publish --provenance --access public
