baseURL: "https://sanogueralorenzo.github.io/"
title: "Mario Sanoguera de Lorenzo"
description: "Short posts about software, recommendations, and whatever is worth writing down."
module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
languageCode: "en-us"
enableRobotsTXT: true
enableGitInfo: true

menu:
  main:
    - identifier: "stories"
      name: "Stories"
      url: "/stories/"
      weight: 10
    - identifier: "search"
      name: "Search"
      url: "/search/"
      weight: 20

params:
  env: production
  description: "Short posts about software, recommendations, and whatever is worth writing down."
  defaultTheme: light
  disableThemeToggle: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  disableAnchoredHeadings: true
  ShowPostNavLinks: true
  hideFooter: true
  # PaperMod "Home Info" block shown at the top of the home page.
  # We extended the stock template to also render an avatar from these keys.
  homeInfoParams:
    Eyebrow: "Mario Sanoguera de Lorenzo"
    Title: "Software, recommendations, and things worth keeping."
    Content: "A quiet place for short posts, tech notes, and recommendations worth sending to a friend instead of leaving buried in a tab."
    ImageURL: "images/home-hero-workspace-v2.png"
    ImageWidth: 720
    ImageHeight: 540
    MediaNoteTitle: "Where posts start"
    MediaNote: "Writing, tinkering, and collecting things worth sharing."
    IntroPills:
      - "Software"
      - "Recommendations"
      - "Field notes"
    PrimaryAction:
      Text: "Read the posts"
      URL: "/stories/"
    SecondaryAction:
      Text: "Open Medium"
      URL: "https://medium.com/@sanogueralorenzo/"
  socialIcons:
    - name: "linkedin"
      url: "https://www.linkedin.com/in/mario-sanoguera-de-lorenzo-b7b392103/"
    - name: "CV"
      url: "https://docs.google.com/document/d/1EPTrdfhl943lO1M98AZua6YlP5cUxEex3BngMLOuMKA/"
    - name: "medium"
      url: "https://medium.com/@sanogueralorenzo/"
    - name: "x"
      url: "https://x.com/MarioSanoguera/"
    - name: "github"
      url: "https://github.com/sanogueralorenzo/"
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    appleTouchIcon: "/apple-touch-icon.png"
    androidChrome192x192: "/android-chrome-192x192.png"
    androidChrome512x512: "/android-chrome-512x512.png"
